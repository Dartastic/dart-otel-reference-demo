# deploy/cloudrun/env/cache-service.env.yaml
#
# Static environment variables for the cache-service Cloud Run
# deployment. Dynamic values (OTLP endpoint, etc.) are layered on
# top by the deploy script via `--update-env-vars` so you don't
# need to commit project-specific values here.
#
# Cloud Run-specific notes:
#
#   * PORT: Cloud Run injects PORT itself — the platform expects the
#     container to listen on whatever PORT it sets, and the value can
#     differ per revision. The cache_service binary reads `PORT`
#     from env and binds to it; we don't set it here.
#
#   * ADMIN_HOST / ADMIN_PORT: The demo's force-flush endpoint runs
#     on a separate port. Cloud Run only routes traffic to the main
#     PORT, so the admin endpoint is unreachable from outside the
#     instance — which is the intended security posture for
#     production. Local dev exposes it via the compose port mapping.
#     Leaving these unset disables the admin endpoint at startup.
#
#   * OTEL_DEMO_MODE: Off in Cloud Run. The flush endpoint is a
#     local-stack convenience and not appropriate in a production
#     deployment.
#
#   * OTEL_RESOURCE_ATTRIBUTES: deployment.environment is the only
#     attribute we set here that the SDK can't auto-detect on Cloud
#     Run. The SDK's `detectPlatformResources: true` (the default)
#     reads:
#       - cloud.provider=gcp
#       - cloud.platform=gcp_cloud_run
#       - cloud.region=<from K_REVISION metadata>
#       - service.instance.id=<Cloud Run instance id, from K_REVISION>
#     so we don't duplicate them here. See the Cloud Run section of
#     deploy/cloudrun/README.md.

OTEL_DEMO_MODE: "false"
OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=cloudrun"
