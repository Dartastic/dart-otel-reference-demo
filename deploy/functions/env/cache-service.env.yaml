# deploy/functions/env/cache-service.env.yaml
#
# Static environment variables for the cache-service Cloud Functions
# Gen 2 deployment. Dynamic values (OTLP endpoint, etc.) layered on
# by the deploy script via `--update-env-vars`.
#
# Cloud Functions Gen 2 runs on Cloud Run, so most of the rationale
# in deploy/cloudrun/env/cache-service.env.yaml carries over
# unchanged. Two differences worth calling out:
#
#   * cloud.platform: the SDK's auto-detection labels containers
#     with K_SERVICE set as `gcp_cloud_run`, but Cloud Functions
#     Gen 2 instances are semantically functions even though they
#     run on the same platform. We override via
#     OTEL_RESOURCE_ATTRIBUTES below so the per-platform breakdown
#     in dashboards splits Functions out from Cloud Run.
#
#   * faas.* attributes: per OTel HTTP / FaaS semconv, function
#     deployments should set `faas.name` and `faas.version`. We set
#     them statically here to the configured function name and the
#     service version baked into the binary; faas.instance comes
#     from K_REVISION (auto-detected) and faas.coldstart is set
#     per-invocation by the SDK when the bootstrap detects a fresh
#     instance.

OTEL_DEMO_MODE: "false"
OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=cloudfunctions,cloud.platform=gcp_cloud_functions,faas.name=cache-service-fn"
