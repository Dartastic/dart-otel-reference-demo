# nginx as the traced edge of the demo (ngx_otel_module).
#
# load_module must be in the main context, before `http`.  The official
# image symlinks /etc/nginx/modules → the package's module dir, so the
# short `modules/...` path resolves.
load_module modules/ngx_otel_module.so;

events {}

http {
    # ── OpenTelemetry: nginx emits its own spans ──
    # Export over OTLP/gRPC to the LGTM collector (same backend the
    # Dart services use).  `propagate` injects W3C traceparent on the
    # upstream request, so weather-api adopts nginx's span as its
    # parent → one unified trace from the front door inward.
    otel_exporter {
        endpoint lgtm:4317;
    }
    otel_service_name nginx-edge;
    otel_trace on;
    otel_trace_context propagate;

    # Forwarded request logging keeps the access log useful next to the
    # traces.
    access_log /dev/stdout;
    error_log  /dev/stderr;

    server {
        listen 8080;
        server_name _;

        location / {
            # A readable span name in the Tempo waterfall instead of the
            # raw method+URI default.
            otel_span_name weather_api;
            proxy_pass http://weather-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
