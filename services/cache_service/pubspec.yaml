name: cache_service
description: >-
  Caching weather provider for the Dart OTel demo. Implements the v1
  weather API (the contract weather_client speaks), filling cache misses
  by calling Open-Meteo via weather_core's OpenMeteoProvider. Inserts a
  second server hop into the demo's distributed-tracing story.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  weather_core:
    path: ../../packages/weather_core
  weather_http_kit:
    path: ../../packages/weather_http_kit
  weather_otel:
    path: ../../packages/weather_otel

  dartastic_opentelemetry: ^1.1.0-beta.4
  # APICounter is the API-level instrument type that the SDK's
  # `meter.createCounter()` returns. The SDK barrel re-exports
  # most of the API but not the abstract instrument types — same
  # pattern as weather_core's WeatherService instruments. Naming
  # it on a `late final` field declaration requires the dep to be
  # explicit, even though it's already transitive via the SDK.
  dartastic_opentelemetry_api: ^1.0.0-beta.6

  shelf: ^1.4.2
  shelf_router: ^1.1.4

  http: ^1.5.0
  logging: ^1.3.0
  meta: ^1.16.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.0
  test: ^1.26.0
