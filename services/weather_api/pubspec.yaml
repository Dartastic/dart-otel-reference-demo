name: weather_api
description: >-
  HTTP front door for the Dart OTel demo. Composes weather_core's
  WeatherService, weather_http_kit's shelf middleware and instrumented
  http.Client, and weather_otel's bootstrap into a deployable binary.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  weather_core:
    path: ../../packages/weather_core
  weather_client:
    path: ../../packages/weather_client
  weather_http_kit:
    path: ../../packages/weather_http_kit
  weather_otel:
    path: ../../packages/weather_otel

  dartastic_opentelemetry: ^1.1.0-beta

  shelf: ^1.4.2
  shelf_router: ^1.1.4

  http: ^1.5.0
  logging: ^1.3.0
  meta: ^1.16.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.0
