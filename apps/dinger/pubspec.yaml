name: dinger
description: "Dinger — last night's baseball highlights, generated by Genkit (on Dartastic OpenTelemetry) and lit up live in Dartastic Hosted."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Google Genkit — depended on via PATH to the local clone that has
  # Workiva's OpenTelemetry ripped out and Dartastic dropped in. Switch
  # to a pub.dev version once a Genkit release ships the Dartastic dep.
  genkit:
    path: ../../../genkit-dart/packages/genkit
  genkit_google_genai:
    path: ../../../genkit-dart/packages/genkit_google_genai

  # Dartastic OpenTelemetry (OSS). The version is pinned by genkit; the
  # actual source is the git override below (the beta has unreleased
  # late-binding fixes Genkit relies on).
  dartastic_opentelemetry: ^1.1.0-beta.6

  http: ^1.5.0
  url_launcher: ^6.3.0
  schemantic: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5

# Match the overrides Genkit-on-Dartastic was developed against. Drop
# these once dartastic_opentelemetry publishes the late-binding fixes.
dependency_overrides:
  # genkit_google_genai pins genkit from pub.dev; force everything to the
  # local Dartastic-wired clone so the whole graph uses one genkit.
  genkit:
    path: ../../../genkit-dart/packages/genkit
  dartastic_opentelemetry:
    git:
      url: https://github.com/MindfulSoftwareLLC/dartastic_opentelemetry.git
      ref: feat/late-binding-proxies
  dartastic_opentelemetry_api:
    git:
      url: https://github.com/MindfulSoftwareLLC/dartastic_opentelemetry_api.git
      ref: feat/noop-default-factory

flutter:
  uses-material-design: true
