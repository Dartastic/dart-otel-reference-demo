name: weather_core
description: >-
  Domain models, weather provider abstraction, and business logic for the
  Dart OTel demo. Instrumented with the Dartastic OpenTelemetry SDK.
  Library code; does not call OTel.initialize() — that is an application
  concern handled by the weather_otel package and consuming services.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  # OpenTelemetry SDK. The Dartastic SDK re-exports MOST of the API
  # surface (semantic enums, Context, Attributes, Span, Tracer, etc.)
  # via a `show` clause. The instrument-interface types
  # (`APICounter`, `APIHistogram`) are NOT in that show clause —
  # `meter.createCounter` and `createHistogram` return them as their
  # statically-typed return value. So we depend on the API package
  # directly to name those types in field declarations and getters.
  dartastic_opentelemetry: ^1.1.0-beta
  dartastic_opentelemetry_api: ^1.0.0-beta.2

  # HTTP client for the Open-Meteo provider. The instrumented wrapper from
  # weather_http_kit will be injected by consumers; this package depends only
  # on the http.Client abstraction so it can be tested without OTel I/O.
  http: ^1.5.0

  # Structured logging. Bridged to OTel logs by the application bootstrap.
  logging: ^1.3.0

  # Annotations only — @immutable, @internal.
  meta: ^1.16.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.0
  test: ^1.26.0
