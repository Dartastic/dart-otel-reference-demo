name: weather_http_kit
description: >-
  Shelf middleware and an instrumented http.Client wrapper for the Dart OTel
  demo. Provides W3C trace context and baggage propagation across HTTP
  boundaries — used by every service and CLI in the demo.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  # OpenTelemetry SDK. Library code; does not call OTel.initialize() —
  # OpenTelemetry SDK. The Dartastic SDK re-exports MOST of the API
  # surface, but TextMapGetter and TextMapSetter (the propagator
  # interfaces we IMPLEMENT in _RequestHeaderGetter / _RequestHeaderSetter)
  # are not in the SDK's show clause. So we depend on the API
  # package directly. The SDK still owns OTel.initialize(), spans,
  # meters, processors, and exporters — consumers do that at app
  # startup.
  dartastic_opentelemetry: ^1.1.0-beta.6
  dartastic_opentelemetry_api: ^1.0.0-beta.7

  # HTTP client we wrap, and shelf for the server-side middleware.
  http: ^1.5.0
  shelf: ^1.4.2

  logging: ^1.3.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.0
  test: ^1.26.0
