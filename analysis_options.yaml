# Static-analysis configuration applied to every package in the
# workspace. Individual packages may add their own
# `analysis_options.yaml` that `include:`s this file and adds further
# rules.
#
# We use `package:dart_flutter_team_lints` (Kevin Moore's package) —
# the lint set the Dart and Flutter teams themselves use for their
# own packages. Aligns with `dartastic_opentelemetry_api`'s lints, so
# code that builds clean on the demo also builds clean against the
# OTel API surface.

include: package:dart_flutter_team_lints/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Aligns with the API package's overrides — these don't add value
    # in a reference demo where examples sometimes need long lines and
    # comment references to neighboring packages.
    lines_longer_than_80_chars: ignore
    comment_references: ignore
    constant_identifier_names: ignore
    todo: ignore
    # Real bugs that the dart_flutter_team_lints baseline reports as
    # warnings — promote to errors so CI catches them.
    missing_required_param: error
    missing_return: error
    invalid_assignment: error
    avoid_dynamic_calls: error

linter:
  rules:
    # Demo-specific additions on top of the team lint baseline.
    avoid_bool_literals_in_conditional_expressions: true
    avoid_catching_errors: true
    avoid_classes_with_only_static_members: false  # we use OTel-style static factories
    avoid_dynamic_calls: true
    avoid_print: true                              # use package:logging instead
    avoid_redundant_argument_values: true
    avoid_slow_async_io: true
    avoid_unused_constructor_parameters: true
    prefer_const_literals_to_create_immutables: true
    prefer_relative_imports: true
    prefer_single_quotes: true
    sort_pub_dependencies: false                   # grouped manually for readability
    test_types_in_equals: true
    throw_in_finally: true
    unawaited_futures: true
    unnecessary_ignore: true
    unnecessary_lambdas: true
    unnecessary_parenthesis: true
    use_super_parameters: true
